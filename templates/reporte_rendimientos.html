{% extends "base.html" %}

{% block title %}Reporte de Rendimientos{% endblock %}

{% block content %}

<div class="card border-0 shadow p-4" style="border-radius:12px;">

    <!-- Encabezado -->
    <div class="d-flex align-items-center mb-4 pb-2 border-bottom">

        <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-3">
            <i class="bi bi-speedometer2 text-primary fs-4"></i>
        </div>

        <h5 class="fw-bold mb-0">
            Reporte de Rendimiento de Combustible
        </h5>

    </div>


    <form method="GET" action="{{ url_for('reporte_rendimientos') }}" class="row g-3">

        <!-- Proyecto -->
        <div class="col-md-4">

            <label class="form-label fw-semibold text-secondary small">
                Proyecto
            </label>

            <div class="input-group">

                <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-building"></i>
                </span>

                <select name="proyecto" class="form-select border-start-0 ps-0">

                    <option value="">
                        Todos
                    </option>

                    {% for p in proyectos %}
                    <option value="{{ p.id }}">
                        {{ p.nombre }}
                    </option>
                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- Vehículo -->
        <div class="col-md-4">

            <label class="form-label fw-semibold text-secondary small">
                Vehículo
            </label>

            <div class="input-group">

                <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-truck"></i>
                </span>

                <select name="vehiculo" class="form-select border-start-0 ps-0">

                    <option value="">
                        Todos
                    </option>

                    {% for v in vehiculos %}
                    <option value="{{ v.id }}">
                        {{ v.nombre }}
                    </option>
                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- Tipo -->
        <div class="col-md-4">

            <label class="form-label fw-semibold text-secondary small">
                Tipo de reporte
            </label>

            <div class="input-group">

                <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-calendar-range"></i>
                </span>

                <select name="tipo" class="form-select border-start-0 ps-0" required>
                    <option value="semanal">
                        Semanal
                    </option>

                    <option value="mensual">
                        Mensual
                    </option>

                    <option value="anual">
                        Anual
                    </option>

                    <option value="personalizado">
                        Rango de fechas
                    </option>

                </select>

            </div>

        </div>

        <div class="row g-3 align-items-end">

            <!-- Fecha Inicial -->
            <div class="col-md-4">
                <label class="form-label fw-semibold text-secondary small">
                    Fecha Inicio
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-calendar3"></i>
                    </span>
                    <input type="date" name="inicio" class="form-control border-start-0 ps-0">
                </div>
            </div>

            <!-- Fecha Final -->
            <div class="col-md-4">
                <label class="form-label fw-semibold text-secondary small">
                    Fecha Fin
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-calendar3"></i>
                    </span>
                    <input type="date" name="fin" class="form-control border-start-0 ps-0">
                </div>
            </div>

            <!-- Botón -->
            <div class="col-md-3 col-sm-6 col-12">
                <button type="submit"
                    class="btn btn-success w-100 fw-semibold d-inline-flex align-items-center justify-content-center gap-2 rounded-3 shadow-sm py-2">
                    <i class="bi bi-filetype-xls fs-5"></i>
                    Exportar Excel
                </button>
            </div>

        </div>
    </form>

</div>

{% endblock %}
