{% extends "base.html" %}

{% block title %}Login | Combustible{% endblock %}

{% block content %}
<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="login-card card border-0 shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 1.25rem;">
        
        <div class="card-body">
            <!-- LOGO / ICONO -->
            <div class="text-center mb-4">
                <div class="bg-primary bg-gradient d-inline-flex align-items-center justify-content-center rounded-circle shadow-sm" style="width: 80px; height: 80px;">
                    <i class="bi bi-fuel-pump-fill fs-1 text-white"></i>
                </div>
            </div>

            <!-- TÍTULOS -->
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Bienvenido al Sistema</h3>
                <p class="text-muted small">Gestión de Combustible y Rendimiento</p>
            </div>

            <!-- FORMULARIO -->
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Nombre de Usuario</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white border-end-0">
                            <i class="bi bi-person text-primary"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Ingrese su usuario" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small fw-bold text-secondary">Contraseña</label>
                        <!-- Opcional: <a href="#" class="small text-decoration-none">¿Olvidó su clave?</a> -->
                    </div>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white border-end-0">
                            <i class="bi bi-lock text-primary"></i>
                        </span>
                        <input type="password" name="password" id="passwordInput" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                        <!-- Toggle Password (UX Pro) -->
                        <button class="btn btn-outline-light border border-start-0 text-muted bg-white" type="button" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm py-3 transition-hover">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted x-small mb-0">&copy; 2024 - Sistema de Control Interno</p>
            </div>
        </div>
        
    </div>
</div>
<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('toggleIcon');
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = "password";
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}


</script>
{% endblock %}
