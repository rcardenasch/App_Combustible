{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h3><i class="bi bi-bag-plus text-success"></i> Registrar Compra</h3>
</div>
<form method="POST" action="{{ url_for('compras_nuevo') }}" id="formCompra">

    <!-- 🔥 PROVEEDOR -->
    <input type="hidden" name="proveedor_id" id="proveedor_id">

    <div class="mb-2">
        <span class="fw-bold">Proveedor:</span>
        <span id="proveedorSeleccionado" class="text-success">
            No seleccionado
        </span>
    </div>
    <!-- 🔥 ALMACENES -->
    <div class="mb-2">
        <select name="almacen_id" class="form-select" required>
            {% for a in almacenes %}
            <option value="{{ a.id }}">{{ a.nombre }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- BOTONES -->
    <div class="d-flex gap-2 mb-3">

        <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#modalProveedor">
            <i class="bi bi-truck"></i> Buscar Proveedor
        </button>

        <button type="button" class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#modalProducto">
            <i class="bi bi-box"></i> Buscar Producto
        </button>

    </div>

    <!-- 🔍 BUSCADOR RÁPIDO -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <input type="text" id="buscarProducto" class="form-control form-control-lg"
                placeholder="🔍 Buscar producto y presionar ENTER">
        </div>
    </div>

    <!-- 🛒 TABLA -->
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Producto</th>
                    <th width="150">Precio compra</th>
                    <th width="120">Cantidad</th>
                    <th width="120">Subtotal</th>
                    <th width="80"></th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <!-- 💰 TOTAL -->
    <div class="d-flex justify-content-end">
        <h4 class="fw-bold">
            Total: S/ <span id="total">0.00</span>
        </h4>
    </div>

    <!-- 🚀 BOTÓN -->
    <div class="d-flex justify-content-end mt-3">
        <button class="btn btn-success btn-lg" id="btnGuardar">
            <i class="bi bi-check-circle"></i> Registrar compra
        </button>
    </div>

</form>

<div class="modal fade" id="modalProveedor">
    <div class="modal-dialog">
        <div class="modal-content p-3">
            <div class="modal-header">
                <h5>Buscar Proveedor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <input type="text" id="buscarProveedorModal" class="form-control mb-2" placeholder="Nombre proveedor">

            <div id="resultadosProveedores"></div>

            <hr>

            <div id="formProveedor" style="display:none;">
                <input id="provNombre" class="form-control mb-2" placeholder="Nombre">
                <input id="provTelefono" class="form-control mb-2" placeholder="Teléfono">
                <input id="provDireccion" class="form-control mb-2" placeholder="Dirección">

                <button class="btn btn-primary" onclick="guardarProveedor()">
                    Guardar
                </button>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="modalProducto">
    <div class="modal-dialog">
        <div class="modal-content p-3">
            <div class="modal-header">
                <h5>Buscar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <input type="text" id="buscarProductoModal" class="form-control mb-2" placeholder="Nombre o código">

            <div id="resultadosProductos"></div>

            <hr>

            <div id="formProducto" style="display:none;">
                <input id="prodNombre" class="form-control mb-2" placeholder="Nombre">
                <input id="prodCodigo" class="form-control mb-2" placeholder="Código barras">
                <input id="prodPrecio" class="form-control mb-2" placeholder="Precio compra">

                <button class="btn btn-primary" onclick="guardarProducto()">
                    Guardar
                </button>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/compras.js') }}"></script>

{% endblock %}
